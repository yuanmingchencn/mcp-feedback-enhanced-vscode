<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Feedback Enhanced</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--vscode-editor-background,#0d1117);
  --fg:var(--vscode-foreground,#c9d1d9);
  --fg-dim:var(--vscode-descriptionForeground,#6e7681);
  --border:var(--vscode-input-border,rgba(99,110,123,0.25));
  --input-bg:var(--vscode-input-background,#161b22);
  --btn-bg:#7c3aed;
  --btn-fg:#fff;
  --btn-hover:#6d28d9;
  --accent:#f59e0b;
  --accent-glow:rgba(245,158,11,0.15);
  --tab-active:var(--vscode-tab-activeBackground,#0d1117);
  --tab-inactive:var(--vscode-tab-inactiveBackground,#161b22);
  --waiting-dot:#f59e0b;
  --success:#10b981;
  --danger:#ef4444;
  --ai-bubble:rgba(124,58,237,0.12);
  --user-bubble:rgba(16,185,129,0.12);
  --glow-purple:rgba(124,58,237,0.4);
  --glow-green:rgba(16,185,129,0.4);
  --surface:rgba(255,255,255,0.03);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--vscode-font-family,'SF Mono','Cascadia Code','JetBrains Mono',monospace);
  font-size:13px;display:flex;flex-direction:column;height:100vh;
}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(124,58,237,0.5)}

/* Tab Bar */
.tab-bar{
  display:flex;align-items:center;height:34px;min-height:34px;
  background:var(--tab-inactive);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  backdrop-filter:blur(8px);
}
.tab-bar::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:6px;padding:0 14px;height:100%;
  cursor:pointer;white-space:nowrap;font-size:11px;color:var(--fg-dim);
  border-right:1px solid var(--border);flex-shrink:0;
  transition:all .2s ease;letter-spacing:.3px;text-transform:uppercase;
}
.tab:hover{background:var(--surface);color:var(--fg)}
.tab.active{
  background:var(--tab-active);color:var(--fg);
  border-bottom:2px solid var(--btn-bg);
  box-shadow:0 1px 8px rgba(124,58,237,0.2);
}
.tab.ended{opacity:.4;font-style:italic}
.tab.tab-ended{opacity:.5}
.tab.tab-ended .dot{background:#666}
.messages-muted .msg-row{opacity:.6}
.messages-muted .msg-row .message{filter:grayscale(.3)}
.tab .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.tab .dot.waiting{background:var(--waiting-dot);box-shadow:0 0 6px var(--waiting-dot);animation:glow-pulse 1.5s infinite}
.tab .dot.running{background:var(--success);box-shadow:0 0 6px var(--success);animation:glow-pulse 2s infinite}
.tab .dot.idle{background:var(--fg-dim)}
.tab .close-btn{display:none;margin-left:4px;opacity:.5;cursor:pointer;font-size:13px;transition:opacity .15s}
.tab:hover .close-btn{display:inline}
.tab .close-btn:hover{opacity:1;color:var(--danger)}
.tab-overflow{padding:0 8px;cursor:pointer;color:var(--fg-dim);font-size:14px;flex-shrink:0;transition:color .15s}
.tab-overflow:hover{color:var(--fg)}

@keyframes glow-pulse{
  0%,100%{opacity:1;box-shadow:0 0 4px currentColor}
  50%{opacity:.5;box-shadow:0 0 10px currentColor}
}

/* Status Bar */
.status-bar{
  display:flex;align-items:center;gap:8px;padding:3px 12px;
  font-size:10px;color:var(--fg-dim);
  border-bottom:1px solid var(--border);
  background:var(--surface);
}

/* Messages */
.messages{
  flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;
  gap:6px;
}
.msg-row{display:flex;animation:msg-in .25s ease-out}
.msg-row.ai{justify-content:flex-start}
.msg-row.user{justify-content:flex-end}
.msg-row.system{justify-content:center}
@keyframes msg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.message{
  max-width:85%;padding:10px 14px;border-radius:14px;
  line-height:1.55;position:relative;
  transition:transform .15s;
}
.message:hover{transform:scale(1.005)}
.msg-row.ai .message{
  background:var(--ai-bubble);
  border:1px solid rgba(124,58,237,0.15);
  border-top-left-radius:4px;
}
.msg-row.user .message{
  background:var(--user-bubble);
  border:1px solid rgba(16,185,129,0.15);
  border-top-right-radius:4px;
}
.msg-row.system .message{
  background:transparent;
  font-size:11px;color:var(--fg-dim);
  padding:4px 12px;max-width:100%;
  letter-spacing:.3px;
  border:none;border-radius:0;
  font-weight:400;text-align:center;
  opacity:.7;
}
.hint-badge{
  display:inline-block;
  background:rgba(100,116,139,0.15);
  border:1px solid rgba(100,116,139,0.25);
  color:var(--fg-dim);font-size:9px;font-weight:500;
  padding:1px 6px;border-radius:8px;
  letter-spacing:.3px;margin-left:6px;
  vertical-align:middle;text-transform:uppercase;
}
.message .header{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--fg-dim);margin-bottom:5px}
.message .header .role{font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.msg-row.ai .message .header .role{color:#a78bfa}
.msg-row.user .message .header .role{color:#6ee7b7}
.message .content{word-break:break-word}
.message .content code{background:rgba(110,118,129,0.15);padding:2px 5px;border-radius:4px;font-size:12px;font-family:inherit}
.message .content pre{background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;border:1px solid var(--border)}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--fg-dim);text-align:center;padding:32px;gap:12px;
}
.empty-state .icon{
  font-size:42px;animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(124,58,237,0.3));
}
.empty-state .title{font-size:14px;font-weight:700;letter-spacing:1.5px;color:var(--fg)}
.empty-state .sub{font-size:11px;opacity:.5;max-width:240px;line-height:1.5}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* Pending */
.pending-section{
  margin:0 12px 8px;padding:10px 12px;
  background:var(--accent-glow);
  border:1px solid rgba(245,158,11,0.25);
  border-radius:10px;display:none;
  backdrop-filter:blur(4px);
}
.pending-section.visible{display:block;animation:msg-in .2s ease-out}
.pending-header{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--accent);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.pending-header button{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;
  border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px;transition:all .15s;
}
.pending-header button:hover{background:rgba(239,68,68,0.2);color:#fca5a5}
.pending-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px}
.pending-item .text{flex:1;word-break:break-word}
.pending-item button{
  background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.3);color:var(--accent);
  border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;opacity:.8;
  transition:all .15s;min-width:28px;text-align:center;
}
.pending-item button:hover{opacity:1;background:rgba(245,158,11,0.15);transform:scale(1.05)}

/* Quick Replies */
.quick-replies{display:flex;gap:6px;padding:6px 12px;flex-wrap:wrap}
.quick-reply-btn{
  background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(16,185,129,0.06));
  border:1px solid rgba(124,58,237,0.2);color:var(--fg-dim);
  border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;
  transition:all .25s cubic-bezier(.4,0,.2,1);letter-spacing:.3px;
  position:relative;overflow:hidden;
}
.quick-reply-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(16,185,129,0.1));
  opacity:0;transition:opacity .25s;
}
.quick-reply-btn:hover{
  border-color:var(--btn-bg);color:var(--fg);
  transform:translateY(-1px);
  box-shadow:0 2px 10px rgba(124,58,237,0.2);
}
.quick-reply-btn:hover::before{opacity:1}
.quick-reply-btn:active{transform:translateY(0);box-shadow:none}

/* Input */
.input-area{padding:8px 12px 10px;border-top:1px solid var(--border);background:var(--surface)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{
  flex:1;min-height:76px;max-height:200px;resize:vertical;
  background:var(--input-bg);color:var(--fg);
  border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-family:inherit;font-size:13px;line-height:1.4;
  transition:border-color .2s,box-shadow .2s;
}
.input-row textarea:focus{outline:none;border-color:var(--btn-bg);box-shadow:0 0 0 2px rgba(124,58,237,0.15)}
.input-row textarea::placeholder{color:var(--fg-dim)}
.send-btn{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:var(--btn-fg);
  border:none;border-radius:10px;padding:10px 18px;cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;
  letter-spacing:.5px;text-transform:uppercase;
  transition:all .2s;box-shadow:0 2px 8px rgba(124,58,237,0.3);
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,58,237,0.4)}
.send-btn:active{transform:translateY(0)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.send-btn.queue-mode{
  background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(251,191,36,0.05));
  color:var(--accent);
  border:1px solid rgba(245,158,11,0.3);box-shadow:none;
}
.send-btn.queue-mode:hover{
  border-color:var(--accent);color:#fbbf24;
  box-shadow:0 2px 10px rgba(245,158,11,0.2);transform:translateY(-1px);
}

/* Image preview */
.image-previews{display:flex;gap:8px;padding:6px 12px;flex-wrap:wrap}
.image-previews:empty{display:none}
.img-preview{
  position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);transition:transform .15s;
}
.img-preview:hover{transform:scale(1.05)}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview .remove{
  position:absolute;top:-2px;right:-2px;width:18px;height:18px;
  background:rgba(239,68,68,0.9);color:#fff;border:none;border-radius:50%;
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;opacity:0;transition:opacity .15s;
}
.img-preview:hover .remove{opacity:1}
.attach-btn{
  background:transparent;border:1px solid var(--border);color:var(--fg-dim);
  border-radius:10px;padding:10px;cursor:pointer;font-size:16px;line-height:1;
  flex-shrink:0;transition:all .2s;
}
.attach-btn:hover{color:var(--fg);border-color:var(--btn-bg);box-shadow:0 0 8px rgba(124,58,237,0.15)}
.message .content img{max-width:200px;max-height:150px;border-radius:8px;margin:6px 0;cursor:zoom-in;display:block;transition:opacity .15s}
.message .content img:hover{opacity:.85}

/* @ Dropdown */
.at-dropdown{
  display:none;position:absolute;bottom:100%;left:0;right:0;
  max-height:240px;overflow-y:auto;z-index:100;
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:10px 10px 0 0;margin-bottom:-1px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.3),0 0 1px rgba(124,58,237,0.3);
  backdrop-filter:blur(12px);
}
.at-dropdown.visible{display:block;animation:at-in .15s ease-out}
@keyframes at-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.at-dropdown-item{
  display:flex;align-items:center;gap:8px;padding:7px 12px;
  cursor:pointer;font-size:12px;transition:background .1s;
}
.at-dropdown-item:hover,.at-dropdown-item.active{
  background:rgba(124,58,237,0.12);
}
.at-dropdown-item .kind-icon{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;opacity:.7;
  background:rgba(124,58,237,0.08);border-radius:5px;
}
.at-dropdown-item .at-label{color:var(--fg);font-weight:500}
.at-dropdown-item .at-detail{color:var(--fg-dim);font-size:10px;margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%}

/* Lightbox */
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
  z-index:999;align-items:center;justify-content:center;cursor:zoom-out;
}
.lightbox.visible{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.7)}

/* Settings */
.settings-toggle{margin-left:auto;flex-shrink:0}
.settings-toggle button{
  background:var(--surface);border:1px solid var(--border);color:var(--fg-dim);
  cursor:pointer;font-size:14px;padding:3px 8px;
  transition:all .2s;border-radius:6px;
}
.settings-toggle button:hover{
  color:var(--fg);border-color:rgba(124,58,237,0.4);
  background:rgba(124,58,237,0.08);
  box-shadow:0 0 8px rgba(124,58,237,0.15);
}
.settings-panel{
  display:none;
  margin:6px 10px;padding:0;
  border:1px solid rgba(124,58,237,0.3);
  border-radius:12px;overflow:hidden;
  background:var(--input-bg);
  box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 1px rgba(124,58,237,0.3);
}
.settings-panel.visible{display:block;animation:settings-in .25s ease-out}
@keyframes settings-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.settings-panel-title{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#a78bfa;padding:10px 14px 8px;
  background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(124,58,237,0.04));
  border-bottom:1px solid rgba(124,58,237,0.15);
}
.settings-panel-body{padding:10px 14px 12px}
.settings-panel label{
  display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:6px;
  cursor:pointer;padding:7px 10px;border-radius:8px;
  border:1px solid transparent;transition:all .15s;
}
.settings-panel label:hover{background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.12)}
.settings-panel input[type="checkbox"]{
  accent-color:#7c3aed;width:15px;height:15px;cursor:pointer;
}
.settings-panel input[type="text"]{
  width:100%;background:rgba(0,0,0,0.2);color:var(--fg);
  border:1px solid var(--border);border-radius:8px;padding:6px 12px;
  font-size:12px;margin-top:4px;transition:all .2s;
}
.settings-panel input[type="text"]:focus{border-color:var(--btn-bg);outline:none;box-shadow:0 0 0 2px rgba(124,58,237,0.12)}

/* Input hidden when viewing ended/idle tab */
body.input-hidden .input-area,
body.input-hidden .quick-replies,
body.input-hidden .image-previews,
body.input-hidden .pending-section{display:none!important}
</style>
</head>
<body>

<div class="tab-bar" id="tabBar">
  <div class="tab-overflow" id="tabOverflow" title="All conversations">...</div>
</div>

<div class="status-bar" id="statusBar">
  <div style="flex:1"></div>
  <div class="settings-toggle"><button id="settingsBtn" title="Settings">⚙</button></div>
</div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-panel-title">⚙ Settings</div>
  <div class="settings-panel-body">
    <label><input type="checkbox" id="autoReplyCheck"> Auto-reply when agent asks</label>
    <input type="text" id="autoReplyText" placeholder="Auto-reply text" value="Continue">
  </div>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="icon">⚡</div>
    <div class="title">AWAITING SIGNAL</div>
    <div class="sub">Agent will connect when it calls interactive_feedback</div>
    <div class="sub">Queue a message below to send when ready</div>
  </div>
</div>

<div class="pending-section" id="pendingSection">
  <div class="pending-header">
    <span>Pending (<span id="pendingCount">0</span>)</span>
    <button id="clearPendingBtn" title="Clear all">✕</button>
  </div>
  <div id="pendingList"></div>
</div>

<div class="quick-replies" id="quickReplies">
  <button class="quick-reply-btn" data-text="Continue">▸ Continue</button>
  <button class="quick-reply-btn" data-text="Looks good, proceed">✓ LGTM</button>
  <button class="quick-reply-btn" data-text="Please fix the issues">⚡ Fix</button>
  <button class="quick-reply-btn" data-text="Stop, let me review first">◼ Pause</button>
</div>

<div class="image-previews" id="imagePreviews"></div>
<div class="input-area" style="position:relative">
  <div class="at-dropdown" id="atDropdown"></div>
  <div class="input-row">
    <button class="attach-btn" id="attachBtn" title="Attach image file">📎</button>
    <textarea id="input" placeholder="Type your feedback... (paste image with Cmd+V, @ to reference files)" rows="4"></textarea>
    <button class="send-btn" id="sendBtn" disabled>Send</button>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">
<div class="lightbox" id="lightbox"><img id="lightboxImg" src=""></div>

<script>
const SERVER_URL = '{{SERVER_URL}}';
const PROJECT_PATH = '{{PROJECT_PATH}}';
const SESSION_ID = '{{SESSION_ID}}';

(function () {
    'use strict';

    const vscode = typeof acquireVsCodeApi === 'function' ? acquireVsCodeApi() : null;

    const tabBar = document.getElementById('tabBar');
    const tabOverflow = document.getElementById('tabOverflow');
    const statusDot = document.getElementById('statusDot');  // may be null
    const statusText = document.getElementById('statusText');  // may be null
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const pendingSection = document.getElementById('pendingSection');
    const pendingCount = document.getElementById('pendingCount');
    const pendingList = document.getElementById('pendingList');
    const clearPendingBtn = document.getElementById('clearPendingBtn');
    const quickReplies = document.getElementById('quickReplies');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const autoReplyCheck = document.getElementById('autoReplyCheck');
    const autoReplyText = document.getElementById('autoReplyText');

    const atDropdown = document.getElementById('atDropdown');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    lightbox.addEventListener('click', () => lightbox.classList.remove('visible'));
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'IMG' && e.target.closest('.message .content')) {
            lightboxImg.src = e.target.src;
            lightbox.classList.add('visible');
        }
    });

    const imagePreviews = document.getElementById('imagePreviews');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');

    let ws = null;
    let reconnectAttempts = 0;
    let activeTabId = null;
    const tabs = new Map();
    let pendingImages = []; // base64 strings

    class TabState {
        constructor(id, label, model, state) {
            this.conversationId = id;
            this.label = label || 'Agent';
            this.model = model || '';
            this.state = state || 'idle';
            this.messages = [];
            this.pendingQueue = [];
            this.pendingSessionId = null;
            this.autoReply = false;
            this.autoReplyText = 'Continue';
            this.inputDraft = '';
            this.pendingImages = [];
        }
    }

    // ── Persistence ──────────────────────────────────────
    const STORAGE_KEY = 'mcp-fb-v2-' + PROJECT_PATH.replace(/[^a-zA-Z0-9]/g, '-').slice(-30);

    function saveState() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                activeTabId,
                tabs: Array.from(tabs.entries()).map(([id, t]) => ({
                    id, label: t.label, model: t.model, state: t.state,
                    messages: t.messages.slice(-100),
                    pendingQueue: t.pendingQueue,
                    autoReply: t.autoReply, autoReplyText: t.autoReplyText,
                    inputDraft: t.inputDraft || '',
                })),
            }));
        } catch {}
    }

    function loadState() {
        try {
            const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (!d) return;
            for (const t of (d.tabs || [])) {
                const tab = new TabState(t.id, t.label, t.model, t.state);
                tab.messages = t.messages || [];
                tab.pendingQueue = t.pendingQueue || [];
                tab.autoReply = t.autoReply || false;
                tab.autoReplyText = t.autoReplyText || 'Continue';
                tab.inputDraft = t.inputDraft || '';
                tabs.set(t.id, tab);
            }
            if (d.activeTabId && tabs.has(d.activeTabId)) {
                activeTabId = d.activeTabId;
                const tab = tabs.get(activeTabId);
                if (tab) input.value = tab.inputDraft || '';
            }
        } catch {}
    }

    // ── Tab Bar ──────────────────────────────────────────
    function renderTabBar() {
        tabBar.querySelectorAll('.tab').forEach(el => el.remove());
        for (const [id, tab] of tabs) {
            const el = document.createElement('div');
            const isEndedOrIdle = tab.state === 'ended' || tab.state === 'idle';
            el.className = 'tab' + (id === activeTabId ? ' active' : '') + (tab.state === 'ended' ? ' ended' : '') + (isEndedOrIdle ? ' tab-ended' : '');

            const dot = document.createElement('span');
            dot.className = 'dot ' + tab.state;
            el.appendChild(dot);

            const lbl = document.createElement('span');
            lbl.textContent = tab.label;
            el.appendChild(lbl);

            const close = document.createElement('span');
            close.className = 'close-btn';
            close.textContent = '×';
            close.onclick = (e) => { e.stopPropagation(); closeTab(id); };
            el.appendChild(close);

            el.onclick = () => switchTab(id);
            tabBar.insertBefore(el, tabOverflow);
        }
    }

    function switchTab(id) {
        if (!tabs.has(id)) return;
        // Save draft of current tab before switching
        if (activeTabId) {
            const prev = tabs.get(activeTabId);
            if (prev) prev.inputDraft = input.value;
        }
        activeTabId = id;
        // Restore draft of new tab
        const tab = tabs.get(id);
        input.value = tab ? (tab.inputDraft || '') : '';
        renderTabBar(); renderMessages(); renderPending(); updateSendButton();
        saveState();
    }

    function closeTab(id) {
        tabs.delete(id);
        if (activeTabId === id) {
            const keys = Array.from(tabs.keys());
            activeTabId = keys.length > 0 ? keys[keys.length - 1] : null;
        }
        renderTabBar(); renderMessages(); renderPending(); updateSendButton();
        saveState();
        // Notify server so other panels sync
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'close_tab', conversation_id: id }));
        }
    }

    function getOrCreateTab(id, label, model, state) {
        if (tabs.has(id)) {
            const existing = tabs.get(id);
            if (label) existing.label = label;
            if (model) existing.model = model;
            if (state) existing.state = state;
            return existing;
        }
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const tab = new TabState(id, label || ('Agent | ' + time), model, state);
        tabs.set(id, tab);
        renderTabBar();
        return tab;
    }

    // ── Messages ─────────────────────────────────────────
    function renderMessages() {
        messagesEl.innerHTML = '';
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (!tab || tab.messages.length === 0) {
            emptyState.style.display = 'flex';
            messagesEl.appendChild(emptyState);
            const isEndedOrIdle = tab && (tab.state === 'ended' || tab.state === 'idle');
            messagesEl.classList.toggle('messages-muted', !!isEndedOrIdle);
            return;
        }
        emptyState.style.display = 'none';

        for (const msg of tab.messages) {
            const row = document.createElement('div');
            row.className = 'msg-row ' + msg.role;
            const el = document.createElement('div');
            el.className = 'message';
            if (msg.role === 'system') {
                el.innerHTML = msg.content.includes('<span') ? msg.content : md(msg.content);
            } else {
                const h = document.createElement('div'); h.className = 'header';
                const r = document.createElement('span'); r.className = 'role';
                r.textContent = msg.role === 'ai' ? '🤖 AI' : '👤 You';
                h.appendChild(r);
                if (msg.pending_delivered) {
                    const badge = document.createElement('span');
                    badge.className = 'hint-badge';
                    badge.textContent = 'queued';
                    h.appendChild(badge);
                }
                if (msg.timestamp) {
                    const t = document.createElement('span');
                    t.textContent = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                    h.appendChild(t);
                }
                el.appendChild(h);
                const c = document.createElement('div'); c.className = 'content';
                c.innerHTML = md(msg.content);
                if (msg.images && msg.images.length > 0) {
                    for (const b64 of msg.images) {
                        const img = document.createElement('img');
                        img.src = 'data:image/png;base64,' + b64;
                        img.title = 'Click to open';
                        c.appendChild(img);
                    }
                }
                el.appendChild(c);
            }
            row.appendChild(el);
            messagesEl.appendChild(row);
        }
        const isEndedOrIdle = tab && (tab.state === 'ended' || tab.state === 'idle');
        messagesEl.classList.toggle('messages-muted', !!isEndedOrIdle);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function md(text) {
        if (!text) return '';
        return text
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
            .replace(/`([^`]+)`/g,'<code>$1</code>')
            .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.+?)\*/g,'<em>$1</em>')
            .replace(/^### (.+)$/gm,'<h4>$1</h4>')
            .replace(/^## (.+)$/gm,'<h3>$1</h3>')
            .replace(/^# (.+)$/gm,'<h2>$1</h2>')
            .replace(/^- (.+)$/gm,'• $1<br>')
            .replace(/\n/g,'<br>');
    }

    // ── Pending Queue ────────────────────────────────────
    function renderPending() {
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        const q = tab ? tab.pendingQueue : [];
        const imgs = tab ? (tab.pendingImages || []) : [];
        if (q.length === 0 && imgs.length === 0) { pendingSection.classList.remove('visible'); return; }
        pendingSection.classList.add('visible');
        const total = q.length + (imgs.length > 0 ? 1 : 0);
        pendingCount.textContent = total;
        pendingList.innerHTML = '';
        q.forEach((text, idx) => {
            const item = document.createElement('div'); item.className = 'pending-item';
            const span = document.createElement('span'); span.className = 'text'; span.textContent = text;
            item.appendChild(span);
            const editBtn = document.createElement('button'); editBtn.textContent = '✎'; editBtn.title = 'Edit';
            editBtn.onclick = () => { input.value = text; q.splice(idx,1); syncPending(); input.focus(); };
            item.appendChild(editBtn);
            const delBtn = document.createElement('button'); delBtn.textContent = '✕'; delBtn.title = 'Remove';
            delBtn.onclick = () => { q.splice(idx,1); syncPending(); };
            item.appendChild(delBtn);
            pendingList.appendChild(item);
        });
        if (imgs.length > 0) {
            const item = document.createElement('div'); item.className = 'pending-item';
            const span = document.createElement('span'); span.className = 'text';
            span.textContent = '🖼 ' + imgs.length + ' image' + (imgs.length > 1 ? 's' : '') + ' attached';
            span.style.opacity = '0.7';
            item.appendChild(span);
            const delBtn = document.createElement('button'); delBtn.textContent = '✕'; delBtn.title = 'Remove images';
            delBtn.onclick = () => { tab.pendingImages = []; syncPending(); };
            item.appendChild(delBtn);
            pendingList.appendChild(item);
        }
    }

    function addToPending(text) {
        const hasText = text && text.trim();
        const hasImages = pendingImages.length > 0;
        if (!hasText && !hasImages) return;
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (!tab) return;
        if (hasText) tab.pendingQueue = [text.trim()];
        if (hasImages) {
            tab.pendingImages = [...pendingImages];
            clearImages();
        }
        syncPending();
        tab.inputDraft = '';
        input.value = '';
    }

    function syncPending() {
        renderPending(); updateSendButton(); saveState();
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (!tab) return;
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                type: 'queue-pending',
                conversation_id: tab.conversationId,
                comments: tab.pendingQueue,
                images: tab.pendingImages || [],
            }));
        }
    }

    clearPendingBtn.addEventListener('click', () => {
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (tab) { tab.pendingQueue = []; tab.pendingImages = []; syncPending(); }
    });

    // ── Smart Send ───────────────────────────────────────
    function updateSendButton() {
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        const hasContent = input.value.trim().length > 0 || pendingImages.length > 0;
        const isWaiting = tab && tab.state === 'waiting' && tab.pendingSessionId;
        const isEnded = tab && tab.state === 'ended';
        const isEndedOrIdle = tab && (tab.state === 'ended' || tab.state === 'idle');
        document.body.classList.toggle('input-hidden', !!isEndedOrIdle);
        if (isEnded) { sendBtn.disabled = true; sendBtn.textContent = 'Ended'; sendBtn.className = 'send-btn'; }
        else if (isWaiting) { sendBtn.disabled = !hasContent; sendBtn.textContent = 'Send'; sendBtn.className = 'send-btn'; }
        else { sendBtn.disabled = !hasContent; sendBtn.textContent = 'Queue'; sendBtn.className = 'send-btn queue-mode'; }
    }

    function smartSend() {
        const text = input.value.trim();
        const hasContent = text || pendingImages.length > 0;
        if (!hasContent) return;
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (!tab) return;
        if (tab.state === 'waiting' && tab.pendingSessionId) submitFeedback(text);
        else addToPending(text);
    }

    function submitFeedback(text) {
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (!tab || !tab.pendingSessionId) return;
        if (ws && ws.readyState === WebSocket.OPEN) {
            const images = pendingImages.slice();
            ws.send(JSON.stringify({
                type: 'feedback_response', session_id: tab.pendingSessionId,
                conversation_id: tab.conversationId, feedback: text, images,
            }));
            const msg = { role: 'user', content: text, timestamp: new Date().toISOString(), images };
            tab.messages.push(msg);
            tab.pendingSessionId = null; tab.state = 'running';
            tab.inputDraft = '';
            input.value = '';
            clearImages();
            renderMessages(); renderTabBar(); updateSendButton(); saveState();
            if (vscode) vscode.postMessage({ type: 'feedback-submitted' });
        }
    }

    // ── Image Handling ──────────────────────────────────
    function addImage(base64) {
        pendingImages.push(base64);
        renderImagePreviews();
        updateSendButton();
    }

    function removeImage(idx) {
        pendingImages.splice(idx, 1);
        renderImagePreviews();
        updateSendButton();
    }

    function clearImages() {
        pendingImages = [];
        renderImagePreviews();
    }

    function renderImagePreviews() {
        imagePreviews.innerHTML = '';
        pendingImages.forEach((b64, idx) => {
            const wrap = document.createElement('div'); wrap.className = 'img-preview';
            const img = document.createElement('img');
            img.src = 'data:image/png;base64,' + b64;
            img.onclick = () => { lightboxImg.src = img.src; lightbox.classList.add('visible'); };
            img.style.cursor = 'zoom-in';
            wrap.appendChild(img);
            const rm = document.createElement('button'); rm.className = 'remove'; rm.textContent = '×';
            rm.onclick = (e) => { e.stopPropagation(); removeImage(idx); };
            wrap.appendChild(rm);
            imagePreviews.appendChild(wrap);
        });
    }

    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => {
                const result = reader.result;
                const base64 = result.split(',')[1];
                resolve(base64);
            };
            reader.readAsDataURL(file);
        });
    }

    // Paste image from clipboard (listen on textarea + document)
    async function handlePaste(e) {
        const items = e.clipboardData?.items;
        if (!items) return;
        let found = false;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                e.preventDefault();
                const file = item.getAsFile();
                if (file) {
                    const b64 = await fileToBase64(file);
                    addImage(b64);
                    found = true;
                }
            }
        }
        return found;
    }
    input.addEventListener('paste', handlePaste);

    // Drag & drop images onto the input area
    const inputArea = input.parentElement.parentElement;
    inputArea.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    inputArea.addEventListener('drop', async (e) => {
        e.preventDefault();
        for (const file of e.dataTransfer.files) {
            if (file.type.startsWith('image/')) {
                const b64 = await fileToBase64(file);
                addImage(b64);
            }
        }
    });

    // Fallback: read from clipboard API (for environments where paste events don't carry images)
    async function pasteFromClipboard() {
        try {
            const items = await navigator.clipboard.read();
            for (const item of items) {
                for (const type of item.types) {
                    if (type.startsWith('image/')) {
                        const blob = await item.getType(type);
                        const b64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result.split(',')[1]);
                            reader.readAsDataURL(blob);
                        });
                        addImage(b64);
                    }
                }
            }
        } catch (err) {
            console.warn('Clipboard read failed:', err);
        }
    }

    // File picker
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async () => {
        for (const file of fileInput.files) {
            if (file.type.startsWith('image/')) {
                const b64 = await fileToBase64(file);
                addImage(b64);
            }
        }
        fileInput.value = '';
    });

    sendBtn.addEventListener('click', smartSend);
    let saveTimer = null;
    input.addEventListener('input', () => {
        updateSendButton();
        if (activeTabId) {
            const tab = tabs.get(activeTabId);
            if (tab) tab.inputDraft = input.value;
        }
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveState, 500);
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); smartSend(); }
    });

    // ── Quick Replies ────────────────────────────────────
    quickReplies.addEventListener('click', (e) => {
        const btn = e.target.closest('.quick-reply-btn');
        if (!btn) return;
        const text = btn.dataset.text;
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (!tab || !text) return;
        if (tab.state === 'waiting' && tab.pendingSessionId) submitFeedback(text);
        else addToPending(text);
    });

    // ── Settings ─────────────────────────────────────────
    settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('visible'));
    autoReplyCheck.addEventListener('change', () => {
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (tab) { tab.autoReply = autoReplyCheck.checked; saveState(); }
    });
    autoReplyText.addEventListener('input', () => {
        const tab = activeTabId ? tabs.get(activeTabId) : null;
        if (tab) { tab.autoReplyText = autoReplyText.value; saveState(); }
    });

    // ── @ Reference Autocomplete ─────────────────────────
    let atSearchTimer = null;
    let atActiveIndex = -1;
    let atItems = [];
    let atVisible = false;

    function getAtQuery() {
        const pos = input.selectionStart;
        const text = input.value.substring(0, pos);
        const match = text.match(/@([^\s]*)$/);
        return match ? { query: match[1], atPos: pos - match[0].length } : null;
    }

    function triggerAtSearch() {
        const result = getAtQuery();
        if (!result || result.query.length === 0) { hideAtDropdown(); return; }
        if (vscode) {
            vscode.postMessage({ type: 'at-search', query: result.query });
        }
    }

    function showAtDropdown(items) {
        atItems = items;
        atActiveIndex = -1;
        if (!items || items.length === 0) { hideAtDropdown(); return; }
        atDropdown.innerHTML = '';
        items.forEach((item, i) => {
            const row = document.createElement('div');
            row.className = 'at-dropdown-item';
            row.dataset.index = i;
            const icon = document.createElement('span');
            icon.className = 'kind-icon';
            icon.textContent = item.kind === 'file' ? '📄' : '🔣';
            const label = document.createElement('span');
            label.className = 'at-label';
            label.textContent = item.label;
            const detail = document.createElement('span');
            detail.className = 'at-detail';
            detail.textContent = item.detail;
            row.appendChild(icon);
            row.appendChild(label);
            row.appendChild(detail);
            row.addEventListener('click', () => selectAtItem(i));
            atDropdown.appendChild(row);
        });
        atDropdown.classList.add('visible');
        atVisible = true;
    }

    function hideAtDropdown() {
        atDropdown.classList.remove('visible');
        atVisible = false;
        atItems = [];
        atActiveIndex = -1;
    }

    function setAtActive(index) {
        const items = atDropdown.querySelectorAll('.at-dropdown-item');
        items.forEach(el => el.classList.remove('active'));
        if (index >= 0 && index < items.length) {
            atActiveIndex = index;
            items[index].classList.add('active');
            items[index].scrollIntoView({ block: 'nearest' });
        }
    }

    function selectAtItem(index) {
        const item = atItems[index];
        if (!item) return;
        const result = getAtQuery();
        if (!result) { hideAtDropdown(); return; }
        const before = input.value.substring(0, result.atPos);
        const after = input.value.substring(input.selectionStart);
        const insert = '@' + item.insertText + ' ';
        input.value = before + insert + after;
        const newPos = before.length + insert.length;
        input.selectionStart = input.selectionEnd = newPos;
        input.focus();
        hideAtDropdown();
        if (activeTabId) {
            const tab = tabs.get(activeTabId);
            if (tab) tab.inputDraft = input.value;
        }
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveState, 500);
    }

    input.addEventListener('input', function atInputHandler() {
        clearTimeout(atSearchTimer);
        const result = getAtQuery();
        if (result && result.query.length > 0) {
            atSearchTimer = setTimeout(triggerAtSearch, 150);
        } else {
            hideAtDropdown();
        }
    });

    const origKeydown = input.onkeydown;
    input.addEventListener('keydown', (e) => {
        if (!atVisible) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            setAtActive(atActiveIndex < atItems.length - 1 ? atActiveIndex + 1 : 0);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            setAtActive(atActiveIndex > 0 ? atActiveIndex - 1 : atItems.length - 1);
        } else if ((e.key === 'Enter' || e.key === 'Tab') && atActiveIndex >= 0) {
            e.preventDefault();
            e.stopPropagation();
            selectAtItem(atActiveIndex);
        } else if (e.key === 'Escape') {
            e.preventDefault();
            hideAtDropdown();
        }
    }, true);

    // ── WebSocket ────────────────────────────────────────
    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        updateStatus('connecting', 'Connecting...');
        try {
            ws = new WebSocket(SERVER_URL);
            ws.onopen = () => {
                reconnectAttempts = 0;
                updateStatus('connected', 'Connected :' + (SERVER_URL.match(/:(\d+)/)?.[1] || '?'));
                ws.send(JSON.stringify({ type: 'register', clientType: 'webview', projectPath: PROJECT_PATH }));
                ws.send(JSON.stringify({ type: 'get_conversations' }));
            };
            ws.onmessage = (e) => { try { handleMsg(JSON.parse(e.data)); } catch {} };
            ws.onclose = () => { updateStatus('disconnected', 'Disconnected'); scheduleReconnect(); };
            ws.onerror = () => { updateStatus('disconnected', 'Connection error'); };
        } catch { updateStatus('disconnected', 'Failed'); scheduleReconnect(); }
    }

    function scheduleReconnect() {
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;
        setTimeout(connect, delay);
    }

    function updateStatus(state, text) {
        if (statusDot) statusDot.className = 'status-dot ' + state;
        if (statusText) statusText.textContent = text;
    }

    // ── Message Handling ─────────────────────────────────
    function handleMsg(msg) {
        switch (msg.type) {
            case 'connection_established': break;

            case 'session_registered': {
                const s = msg.session || {}, conv = msg.conversation || {};
                const id = s.conversation_id || conv.conversation_id;
                if (!id) break;
                const tab = getOrCreateTab(id, conv.label, conv.model || s.model, conv.state || 'idle');
                if (conv.messages) tab.messages = conv.messages;
                if (!activeTabId) switchTab(id); else renderTabBar();
                break;
            }

            case 'session_ended': {
                const tab = tabs.get(msg.conversation_id);
                if (tab) {
                    tab.state = 'ended';
                    tab.messages.push({ role: 'system', content: '── Session ended ──', timestamp: new Date().toISOString() });
                    renderTabBar();
                    if (msg.conversation_id === activeTabId) { renderMessages(); updateSendButton(); }
                    saveState();
                }
                break;
            }

            case 'session_updated': {
                const info = msg.session_info || {};
                const id = info.conversation_id || '';
                const tab = getOrCreateTab(id, info.label || null, null, 'waiting');
                tab.state = 'waiting';
                tab.pendingSessionId = info.session_id;
                tab.messages.push({ role: 'ai', content: info.summary || '', timestamp: new Date().toISOString() });

                switchTab(id);
                if (vscode) vscode.postMessage({ type: 'new-session' });
                if (tab.pendingQueue.length > 0 || (tab.pendingImages && tab.pendingImages.length > 0)) {
                    const combined = tab.pendingQueue.join('\n\n');
                    // Restore queued images before sending
                    if (tab.pendingImages && tab.pendingImages.length > 0) {
                        pendingImages = tab.pendingImages;
                        tab.pendingImages = [];
                    }
                    tab.pendingQueue = [];
                    renderPending();
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'queue-pending', conversation_id: id, comments: [] }));
                    }
                    submitFeedback(combined || '(image)');
                    return;
                }
                if (tab.autoReply && tab.autoReplyText) {
                    setTimeout(() => {
                        if (tab.state === 'waiting' && tab.pendingSessionId === info.session_id) {
                            submitFeedback(tab.autoReplyText);
                            tab.messages.push({ role: 'system', content: 'Auto-replied: ' + tab.autoReplyText, timestamp: new Date().toISOString() });
                        }
                    }, 500);
                }
                break;
            }

            case 'feedback_submitted': {
                const tab = tabs.get(msg.conversation_id);
                if (tab) {
                    const last = tab.messages[tab.messages.length - 1];
                    const alreadyHas = last && last.role === 'user' && last.content === msg.feedback;
                    if (msg.feedback && !alreadyHas) {
                        tab.messages.push({ role: 'user', content: msg.feedback, timestamp: new Date().toISOString() });
                    }
                    tab.pendingSessionId = null; tab.state = 'running';
                    renderTabBar(); updateSendButton();
                    if (msg.conversation_id === activeTabId) renderMessages();
                    saveState();
                }
                break;
            }

            case 'pending-consumed': {
                const tab = tabs.get(msg.conversation_id);
                if (tab && tab.pendingQueue.length > 0) {
                    tab.messages.push({ role: 'system', content: '⚡ Pending delivered', timestamp: new Date().toISOString() });
                    tab.pendingQueue = [];
                    if (msg.conversation_id === activeTabId) { renderMessages(); renderPending(); }
                    saveState();
                }
                break;
            }

            case 'conversations_list':
                for (const c of (msg.conversations || [])) {
                    const tab = getOrCreateTab(c.conversation_id, c.label, c.model, c.state);
                    if (c.active_session_id) tab.pendingSessionId = c.active_session_id;
                }
                if (!activeTabId && tabs.size > 0) switchTab(Array.from(tabs.keys())[tabs.size - 1]);
                renderTabBar();
                if (activeTabId && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'load_conversation', conversation_id: activeTabId }));
                }
                break;

            case 'conversation_loaded': {
                const conv = msg.conversation;
                if (!conv) break;
                const tab = getOrCreateTab(conv.conversation_id, conv.label, conv.model, conv.state);
                tab.messages = conv.messages || [];
                tab.pendingQueue = conv.pending_queue || [];
                if (conv.conversation_id === activeTabId) { renderMessages(); renderPending(); }
                saveState();
                break;
            }

            case 'pending_delivered': {
                const tab = tabs.get(msg.conversation_id);
                if (tab) {
                    const comments = msg.comments || [];
                    const images = msg.images || [];
                    for (let i = 0; i < comments.length; i++) {
                        const m = { role: 'user', content: comments[i], timestamp: new Date().toISOString(), pending_delivered: true };
                        if (i === comments.length - 1 && images.length > 0) m.images = images;
                        tab.messages.push(m);
                    }
                    if (comments.length === 0 && images.length > 0) {
                        tab.messages.push({ role: 'user', content: '', timestamp: new Date().toISOString(), pending_delivered: true, images });
                    }
                    tab.pendingQueue = [];
                    tab.pendingImages = [];
                    if (msg.conversation_id === activeTabId) {
                        renderMessages(); renderPending();
                    }
                    saveState();
                }
                break;
            }

            case 'tab_closed': {
                const cid = msg.conversation_id;
                if (cid && tabs.has(cid)) {
                    tabs.delete(cid);
                    if (activeTabId === cid) {
                        const keys = Array.from(tabs.keys());
                        activeTabId = keys.length > 0 ? keys[keys.length - 1] : null;
                    }
                    renderTabBar(); renderMessages(); renderPending(); updateSendButton();
                    saveState();
                }
                break;
            }

            case 'pending_synced': {
                const tab = tabs.get(msg.conversation_id);
                if (tab) {
                    tab.pendingQueue = msg.comments || [];
                    if (msg.images !== undefined) tab.pendingImages = msg.images;
                    if (msg.conversation_id === activeTabId) renderPending();
                    saveState();
                }
                break;
            }

            case 'pong': case 'status_update': break;
        }
    }

    // ── Extension Messages ───────────────────────────────
    window.addEventListener('message', (event) => {
        const msg = event.data;
        if (msg.type === 'reconnect') { if (ws) { try { ws.close(); } catch {} } ws = null; reconnectAttempts = 0; connect(); }
        else if (msg.type === 'focus-input') input.focus();
        else if (msg.type === 'at-results') showAtDropdown(msg.items || []);
    });

    // ── Heartbeat ────────────────────────────────────────
    setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' })); }, 30000);

    // ── Init ─────────────────────────────────────────────
    loadState(); renderTabBar(); renderMessages(); renderPending(); updateSendButton(); connect();
})();
</script>
</body>
</html>
